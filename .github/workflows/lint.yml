name: lint

# Thin caller for the reusable shell/actionlint gate authored in dotfiles-core
# (.github/workflows/lint-call.yml) — one definition for the whole fleet, replacing the
# ~200-line copy this file used to carry. The gate's internals (the SHA-256-verified
# pinned-tool bootstrap, the core/ exclude, shfmt-advisory) live there now. This repo has no
# extra excludes (only Kali does), so no `with:` is needed.
on:
  push:
    branches: [main, master]
    paths-ignore: ["**.md", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: dotgibson/dotfiles-core/.github/workflows/lint-call.yml@v3
