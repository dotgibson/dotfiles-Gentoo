# dotfiles-Gentoo/os/gentoo.conf  →  ~/.config/tmux/os.conf
# ──────────────────────────────────────────────────────────────────────────────
# Gentoo-specific tmux bits, sourced by Core's tmux.conf via:
#   source-file -q ~/.config/tmux/os.conf
# Network interface name + battery id the tokyo-night-tmux theme reads — these
# don't travel between machines, so EDIT them.
#
# Find your interface:   ip -o route show default | awk '{print $5}'
# Find your battery:     ls /sys/class/power_supply   (common: BAT0, BAT1)
# ──────────────────────────────────────────────────────────────────────────────

# ── netspeed widget — interface auto-derived from the default route ──────────
set -g @tokyo-night-tmux_show_netspeed       1
# Left at the "eth0" sentinel, the primary interface is AUTO-DERIVED from the default
# route below — correct on WSL/cloud (eth0) AND bare metal (enp*/wlp*) with no manual
# edit. To PIN a specific iface, set it here to anything OTHER than eth0; the auto-derive
# is then skipped and your value is kept.
set -g @tokyo-night-tmux_netspeed_iface      "eth0"
# Override the eth0 sentinel with the real default-route iface — ONLY while it's still
# "eth0" (so a pinned value above is respected). Covers IPv4 AND IPv6 default routes;
# portable (command -v guard + sed, busybox-safe); fails safe to eth0 when nothing found.
run-shell 'cur=$(tmux show -gv @tokyo-night-tmux_netspeed_iface 2>/dev/null); [ "$cur" = "eth0" ] && command -v ip >/dev/null 2>&1 && i=$(ip -o route show default 2>/dev/null | sed -n "s/.* dev \([^ ]*\).*/\1/p" | head -1) && [ -n "$i" ] && tmux set -g @tokyo-night-tmux_netspeed_iface "$i"'
set -g @tokyo-night-tmux_netspeed_showip     1
set -g @tokyo-night-tmux_netspeed_refresh    1

# ── battery widget — laptops only ────────────────────────────────────────────
set -g @tokyo-night-tmux_show_battery_widget   0
set -g @tokyo-night-tmux_battery_name          "BAT0"
set -g @tokyo-night-tmux_battery_low_threshold 21
